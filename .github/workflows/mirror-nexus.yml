name: Mirror Nexus Mods to GitHub Release

permissions:
  contents: write   # ← Bu satır çok önemli

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  download-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download from Nexus Mods
        run: |
          curl -L -o "DLSS_Enabler.zip" \
            "https://api.nexusmods.com/v1/games/site/mods/757/files/8056/download.json?api_key=${{ secrets.NEXUS_API_KEY }}"
          
          ls -la DLSS_Enabler.zip
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v$(date +'%Y%m%d-%H%M')"
          name: "DLSS Enabler - $(date +'%Y-%m-%d')"
          draft: false
          prerelease: false
          files: DLSS_Enabler.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
