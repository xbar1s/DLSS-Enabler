name: Mirror Nexus Mods to GitHub Release

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'   # Her gün 04:00

jobs:
  download-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download from Nexus Mods
        run: |
          echo "🔄 Nexus download link alınıyor..."
          
          # 1. Download link JSON'ini al
          JSON=$(curl -s -H "APIKEY: ${{ secrets.NEXUS_API_KEY }}" \
            "https://api.nexusmods.com/v1/games/site/mods/757/files/8056/download_link.json")
          
          echo "📥 JSON Response:"
          echo "$JSON" | jq || echo "$JSON"
          
          # 2. JSON'dan gerçek download URL'sini çıkar
          DOWNLOAD_URL=$(echo "$JSON" | jq -r '.url')
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "❌ Download URL alınamadı!"
            echo "API Response: $JSON"
            exit 1
          fi
          
          echo "⬇️ Dosya indiriliyor..."
          curl -L -o "DLSS_Enabler.zip" "$DOWNLOAD_URL" --fail --silent --show-error
          
          echo "📊 İndirilen dosya bilgisi:"
          ls -la DLSS_Enabler.zip
          file DLSS_Enabler.zip
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v$(date +'%Y%m%d-%H%M')"
          name: "DLSS Enabler - $(date +'%Y-%m-%d %H:%M')"
          draft: false
          prerelease: false
          files: DLSS_Enabler.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
